<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavan</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
}

/* BACKGROUND */
body{
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
color:white;
animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* OVERLAY */
body::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
top:0;
left:0;
}

/* SOFT GLOW */
body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,#38bdf8,transparent);
filter:blur(140px);
opacity:0.2;
animation:move 10s infinite alternate;
z-index:1;
}

@keyframes move{
0%{transform:translate(-100px,-100px);}
100%{transform:translate(100px,100px);}
}

/* CONTAINER */
.container{
position:relative;
z-index:2;
text-align:center;
width:100%;
max-width:400px;
padding:20px;
}

/* IMAGE */
img{
width:180px;
height:180px;
border-radius:50%;
margin-bottom:20px;
object-fit:cover;

box-shadow:
0 10px 30px rgba(0,0,0,0.6),
0 0 20px rgba(56,189,248,0.4);

transition:0.4s ease;
}

img:hover{
transform:perspective(800px) rotateX(5deg) rotateY(5deg) scale(1.05);
box-shadow:
0 20px 50px rgba(0,0,0,0.8),
0 0 30px rgba(56,189,248,0.6);
}

/* TITLE */
h1{
margin-bottom:10px;
font-size:26px;
}

/* TEXT */
#typing{
font-size:16px;
opacity:0.85;
line-height:1.6;
min-height:100px;
}

/* CURSOR */
.cursor{
display:inline-block;
width:2px;
height:18px;
background:white;
margin-left:5px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1;}
25%,75%{opacity:0;}
}

/* BUTTON */
button{
margin-top:25px;
padding:12px 28px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#38bdf8,#6366f1);
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 20px rgba(99,102,241,0.6);
}

/* FADE TEXT */
.fadeText{
opacity:0;
transform:translateY(10px);
animation:fadeUp 1s ease forwards;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div class="container">

<img src="YOUR_IMAGE.jpg">

<h1>Hi, I'm Pavan 👀</h1>

<div id="typing"><span class="cursor"></span></div>

<a href="https://instagram.com/pavanm_57" target="_blank">
<button>Let's Connect →</button>
</a>

</div>

<script>

let lines = [
  "Hey, this is Pavan",
  "From Rajasthan 🏜️",
  "Engineer from NIT Kurukshetra 🎓",
  "Government Auditor 🏛️",
  "Currently in Ranchi 📍",
  "Focused on growth & discipline 🚀",
  "Not perfect… but worth knowing 🙂"
];

let lineIndex = 0;
let charIndex = 0;

function typeEffect(){
let el = document.getElementById("typing");

if(lineIndex < lines.length){

if(charIndex < lines[lineIndex].length){
el.innerHTML =
lines[lineIndex].substring(0,charIndex+1) +
'<span class="cursor"></span>';

charIndex++;
setTimeout(typeEffect,60);

}else{
lineIndex++;
charIndex = 0;
setTimeout(typeEffect,600);
}

}else{

/* FADE OUT */
el.style.transition="opacity 0.4s";
el.style.opacity="0";

setTimeout(()=>{
el.innerHTML = `
<div class="fadeText">
Hey, this is Pavan. From Rajasthan 🏜️.  
Engineer from NIT Kurukshetra 🎓, currently working as a Government Auditor 🏛️.  
Living in Ranchi 📍 and focused on growth, discipline and becoming better every day 🚀.  
Not perfect… but worth knowing 🙂
</div>
`;
},400);

}

}

typeEffect();

</script>

</body>
</html>
