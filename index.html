<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavan | Intro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
}

/* LOADER */
#loader{
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#loader h1{
    font-size:3rem;
    color:white;
    letter-spacing:5px;
    animation:netflix 2.5s ease forwards;
}

@keyframes netflix{
    0%{opacity:0; transform:scale(0.8); text-shadow:0 0 0px red;}
    50%{opacity:1; transform:scale(1.2); text-shadow:0 0 30px red,0 0 60px red;}
    100%{opacity:0; transform:scale(1); text-shadow:0 0 0px red;}
}

/* PARTICLES */
#particles{
    position:fixed;
    width:100%;
    height:100%;
    z-index:1;
}

/* SLIDES */
.slide{
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    overflow:hidden;
}

.slide::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:inherit;
    background-size:cover;
    background-position:center;
    filter:blur(8px);
    transform:scale(1.1);
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:1;
}

.hidden{
    transform:translateY(100%);
    transition:1s;
}

h1{
    color:white;
    font-size:2.2rem;
    text-align:center;
    z-index:2;
    position:relative;
    animation:fadeUp 1.5s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

button{
    z-index:2;
    position:relative;
    padding:14px 30px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    color:white;
    cursor:pointer;
    margin-top:20px;
    display:flex;
    align-items:center;
    gap:10px;
}

button:hover{
    transform:scale(1.07);
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <h1>PAVAN</h1>
</div>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<!-- SLIDES -->

<div class="slide" id="slide1" style="background-image:url('YOUR_IMAGE.jpg')">
<div class="overlay"></div>
<h1 id="text1"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide hidden" id="slide2" style="background-image:url('YOUR_IMAGE.jpg')">
<div class="overlay"></div>
<h1 id="text2"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide hidden" id="slide3" style="background-image:url('YOUR_IMAGE.jpg')">
<div class="overlay"></div>
<h1 id="text3"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide hidden" id="slide4" style="background-image:url('YOUR_IMAGE.jpg')">
<div class="overlay"></div>
<h1 id="text4"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide hidden" id="slide5" style="background-image:url('YOUR_IMAGE.jpg')">
<div class="overlay"></div>
<h1 id="text5"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide hidden" id="slide6" style="background:black">
<h1 id="finalText"></h1>

<button onclick="openInsta()">
<i class="fa-brands fa-instagram"></i>
Connect on Instagram
</button>
</div>

<script>

/* LOADER */
window.addEventListener("load", ()=>{
    setTimeout(()=>{
        document.getElementById("loader").style.display="none";
    },2500);
});

let current = 1;

function next(){
    document.getElementById("slide"+current).classList.add("hidden");
    current++;
    document.getElementById("slide"+current).classList.remove("hidden");
}

/* INSTAGRAM (YOUR LINK ADDED) */
function openInsta(){
    navigator.vibrate(100);
    window.open("https://www.instagram.com/pavanm_57","_blank");
}

/* AUTO REDIRECT */
function autoRedirect(){
    setTimeout(()=>{
        window.open("https://www.instagram.com/pavanm_57","_blank");
    },5000);
}

/* TYPING */
function type(text,id,speed=50){
    let i=0;
    function typing(){
        if(i<text.length){
            document.getElementById(id).innerHTML+=text.charAt(i);
            i++;
            setTimeout(typing,speed);
        }
    }
    typing();
}

/* STORY */
type("Hi, I'm Pavan 👋","text1");

setTimeout(()=>{type("Born in Rajasthan 🏜️","text2");},2000);
setTimeout(()=>{type("Currently building my life in Ranchi 🌆","text3");},4000);
setTimeout(()=>{type("Engineer from NIT Kurukshetra 🎓","text4");},6000);
setTimeout(()=>{type("Currently working at Government of India 💼","text5");},8000);

setTimeout(()=>{
    type("For more information, let's connect on Instagram...","finalText",70);
    autoRedirect();
},10000);

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<100;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        speed:Math.random()+0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.y-=p.speed;
        if(p.y<0) p.y=canvas.height;
        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    });
    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
