<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavan | Intro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
}

/* CONTAINER */
.container{
    position:relative;
    width:100%;
    height:100vh;
}

/* SLIDES */
.slide{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    transition:0.8s ease;
    opacity:0;
}

/* ACTIVE SLIDE */
.active{
    opacity:1;
    z-index:2;
}

/* BACKGROUND */
.bg{
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    filter:blur(8px);
    transform:scale(1.1);
}

/* OVERLAY */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

/* TEXT */
h1{
    color:white;
    font-size:2rem;
    text-align:center;
    z-index:2;
    padding:20px;
}

/* BUTTON */
button{
    z-index:2;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff416c;
    color:white;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<!-- SLIDE 1 -->
<div class="slide active">
<div class="bg" style="background-image:url('YOUR_IMAGE.jpg')"></div>
<div class="overlay"></div>
<h1 id="text1"></h1>
<button onclick="next()">Next ➝</button>
</div>

<!-- SLIDE 2 -->
<div class="slide">
<div class="bg" style="background-image:url('YOUR_IMAGE.jpg')"></div>
<div class="overlay"></div>
<h1 id="text2"></h1>
<button onclick="next()">Next ➝</button>
</div>

<!-- SLIDE 3 -->
<div class="slide">
<div class="bg" style="background-image:url('YOUR_IMAGE.jpg')"></div>
<div class="overlay"></div>
<h1 id="text3"></h1>
<button onclick="next()">Next ➝</button>
</div>

<!-- SLIDE 4 -->
<div class="slide">
<div class="bg" style="background-image:url('YOUR_IMAGE.jpg')"></div>
<div class="overlay"></div>
<h1 id="text4"></h1>
<button onclick="next()">Next ➝</button>
</div>

<!-- SLIDE 5 -->
<div class="slide">
<div class="bg" style="background-image:url('YOUR_IMAGE.jpg')"></div>
<div class="overlay"></div>
<h1 id="text5"></h1>
<button onclick="next()">Next ➝</button>
</div>

<!-- FINAL -->
<div class="slide">
<div class="bg" style="background:black"></div>
<div class="overlay"></div>
<h1 id="text6"></h1>
<button onclick="openInsta()">Connect on Instagram</button>
</div>

</div>

<script>

let slides = document.querySelectorAll(".slide");
let current = 0;

/* NEXT */
function next(){
    slides[current].classList.remove("active");
    current++;
    slides[current].classList.add("active");
}

/* INSTAGRAM */
function openInsta(){
    window.open("https://www.instagram.com/pavanm_57","_blank");
}

/* TYPING */
function type(text, el, callback){
    let i=0;
    function typing(){
        if(i<text.length){
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing,40);
        } else if(callback){
            callback();
        }
    }
    typing();
}

/* START */
type("Hi, I'm Pavan 👋", document.getElementById("text1"), ()=>{
    type("Born in Rajasthan 🏜️", document.getElementById("text2"), ()=>{
        type("Currently in Ranchi 🌆", document.getElementById("text3"), ()=>{
            type("Engineer from NIT Kurukshetra 🎓", document.getElementById("text4"), ()=>{
                type("Working at Government of India 💼", document.getElementById("text5"), ()=>{
                    type("Let's connect on Instagram...", document.getElementById("text6"));
                });
            });
        });
    });
});

</script>

</body>
</html>
