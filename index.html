<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background:#020617;
color:#e2e8f0;
overflow:hidden;
}

/* AMBIENT LIGHT (VERY SUBTLE) */
body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,#6366f1,transparent);
filter:blur(140px);
opacity:0.08;
animation:move 14s infinite alternate;
}

@keyframes move{
0%{transform:translate(-120px,-120px);}
100%{transform:translate(120px,120px);}
}

/* CARD */
.card{
position:relative;
z-index:2;
padding:50px 35px;
border-radius:24px;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(18px);
text-align:center;
width:90%;
max-width:360px;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(15px);}
to{opacity:1;}
}

/* IMAGE */
img{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
margin-bottom:25px;
transition:0.5s ease;
filter:grayscale(10%);
}

img:hover{
transform:scale(1.04);
filter:grayscale(0%);
}

/* NAME */
h1{
font-size:22px;
font-weight:500;
letter-spacing:1px;
margin-bottom:12px;
}

/* TEXT */
#text{
font-size:14px;
opacity:0.65;
min-height:50px;
letter-spacing:0.5px;
}

/* FINAL LINE */
.final{
opacity:0;
animation:fadeUp 1.2s ease forwards;
font-size:15px;
letter-spacing:0.6px;
}

@keyframes fadeUp{
to{opacity:1; transform:translateY(0);}
}

/* BUTTON */
.btn{
margin-top:30px;
padding:11px 24px;
border-radius:999px;
border:1px solid rgba(255,255,255,0.15);
background:transparent;
color:#e2e8f0;
font-size:13px;
cursor:pointer;
display:none;
align-items:center;
gap:6px;
transition:0.3s ease;
}

.btn:hover{
background:rgba(255,255,255,0.08);
transform:translateY(-2px);
}

/* SHOW BUTTON */
.btn.show{
display:inline-flex;
animation:fadeUp 1s ease forwards;
}
</style>
</head>

<body>

<div class="card">

<img src="YOUR_IMAGE.jpg">

<h1>Pavan</h1>

<div id="text"></div>

<a href="https://instagram.com/pavanm_57" target="_blank">
<button id="btn" class="btn">
<i class="fa-brands fa-instagram"></i>
Connect
</button>
</a>

</div>

<script>

let lines=[
"Engineer, NIT Kurukshetra",
"Government of India",
"Rajasthan → Ranchi"
];

let i=0,j=0,del=false;
let el=document.getElementById("text");

function type(){

let current=lines[i];

if(!del){
if(j<current.length){
el.innerHTML=current.substring(0,j+1);
j++;
setTimeout(type,80);
}else{
del=true;
setTimeout(type,900);
}
}else{
if(j>0){
el.innerHTML=current.substring(0,j-1);
j--;
setTimeout(type,25);
}else{
del=false;
i++;

if(i<lines.length){
setTimeout(type,400);
}else{

/* FINAL LINE */
el.innerHTML=`<div class="final">
Not here to impress everyone. Just the right one.
</div>`;

document.getElementById("btn").classList.add("show");

}
}
}

}

type();

</script>

</body>
</html>
