<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavan | Intro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
}

/* CONTAINER */
.container{
    position:relative;
    width:100%;
    height:100vh;
}

/* SLIDES */
.slide{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    transition:opacity 1.2s ease; /* slow transition */
}

/* ACTIVE */
.active{
    opacity:1;
    z-index:2;
}

/* BG */
.bg{
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    filter:blur(8px);
    transform:scale(1.1);
}

/* OVERLAY */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

/* TEXT */
h1{
    color:white;
    font-size:2rem;
    text-align:center;
    z-index:2;
    padding:20px;
}

/* BUTTON */
button{
    z-index:2;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff416c;
    color:white;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<!-- SLIDES -->
<div class="slide active">
<div class="bg" style="background-image:url('YOUR_IMAGE.jpg')"></div>
<div class="overlay"></div>
<h1 id="text0"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide">
<div class="bg" style="background-image:url('YOUR_IMAGE.jpg')"></div>
<div class="overlay"></div>
<h1 id="text1"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide">
<div class="bg" style="background-image:url('YOUR_IMAGE.jpg')"></div>
<div class="overlay"></div>
<h1 id="text2"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide">
<div class="bg" style="background-image:url('YOUR_IMAGE.jpg')"></div>
<div class="overlay"></div>
<h1 id="text3"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide">
<div class="bg" style="background-image:url('YOUR_IMAGE.jpg')"></div>
<div class="overlay"></div>
<h1 id="text4"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide">
<div class="bg" style="background:black"></div>
<div class="overlay"></div>
<h1 id="text5"></h1>
<button onclick="openInsta()">Connect on Instagram</button>
</div>

</div>

<script>

let slides = document.querySelectorAll(".slide");
let current = 0;

/* NEXT */
function next(){
    slides[current].classList.remove("active");
    current++;
    slides[current].classList.add("active");

    startTyping(current);
}

/* INSTAGRAM */
function openInsta(){
    window.open("https://www.instagram.com/pavanm_57","_blank");
}

/* SLOW TYPING */
function type(text, element){
    element.innerHTML = "";
    let i = 0;

    function typing(){
        if(i < text.length){
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 70); // slow typing
        }
    }
    typing();
}

/* TEXT ARRAY */
const texts = [
    "Hi, I'm Pavan 👋",
    "Born in Rajasthan 🏜️",
    "Currently living in Ranchi 🌆",
    "Engineer from NIT Kurukshetra 🎓",
    "Working at Government of India 💼",
    "Let's connect on Instagram..."
];

/* START FIRST */
function startTyping(index){
    let el = document.getElementById("text"+index);
    if(el) type(texts[index], el);
}

startTyping(0);

</script>

</body>
</html>
