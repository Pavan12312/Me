<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavan | Intro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
}

/* LOADER */
#loader{
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#loader h1{
    font-size:3rem;
    color:white;
    animation:fade 2.5s ease;
}

@keyframes fade{
    0%{opacity:0}
    50%{opacity:1}
    100%{opacity:0}
}

/* SLIDES */
.slide{
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    transition:1s;
    overflow:hidden;
}

/* BLUR BG */
.slide::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:inherit;
    background-size:cover;
    background-position:center;
    filter:blur(8px);
    transform:scale(1.1);
}

/* OVERLAY */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

/* HIDDEN */
.hidden{
    transform:translateX(100%);
}

/* TEXT */
h1{
    color:white;
    font-size:2.2rem;
    text-align:center;
    z-index:2;
}

/* BUTTON */
button{
    z-index:2;
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff416c;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader"><h1>PAVAN</h1></div>

<!-- SOUND -->
<audio id="typeSound" src="https://www.soundjay.com/mechanical/typewriter-key-1.mp3"></audio>

<!-- SLIDES -->

<div class="slide" id="slide1" style="background-image:url('YOUR_IMAGE.jpg')">
<div class="overlay"></div>
<h1 id="text1"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide hidden" id="slide2" style="background-image:url('YOUR_IMAGE.jpg')">
<div class="overlay"></div>
<h1 id="text2"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide hidden" id="slide3" style="background-image:url('YOUR_IMAGE.jpg')">
<div class="overlay"></div>
<h1 id="text3"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide hidden" id="slide4" style="background-image:url('YOUR_IMAGE.jpg')">
<div class="overlay"></div>
<h1 id="text4"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide hidden" id="slide5" style="background-image:url('YOUR_IMAGE.jpg')">
<div class="overlay"></div>
<h1 id="text5"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide hidden" id="slide6" style="background:black">
<h1 id="text6"></h1>
<button onclick="openInsta()">
<i class="fa-brands fa-instagram"></i> Connect on Instagram
</button>
</div>

<script>

/* LOADER */
window.onload=()=>{
    setTimeout(()=>{
        document.getElementById("loader").style.display="none";
        startTyping();
    },2500);
};

let current=1;

/* NEXT */
function next(){
    document.getElementById("slide"+current).classList.add("hidden");
    current++;
    document.getElementById("slide"+current).classList.remove("hidden");
}

/* INSTAGRAM */
function openInsta(){
    navigator.vibrate(100);
    window.open("https://www.instagram.com/pavanm_57","_blank");
}

/* TYPING WITH SOUND */
function type(text,id,callback){
    let i=0;
    const sound=document.getElementById("typeSound");

    function typing(){
        if(i<text.length){
            document.getElementById(id).innerHTML+=text.charAt(i);
            sound.currentTime=0;
            sound.play();
            i++;
            setTimeout(typing,50);
        } else if(callback){
            callback();
        }
    }
    typing();
}

/* FLOW */
function startTyping(){
    type("Hi, I'm Pavan 👋","text1",()=>{
        type("Born in Rajasthan 🏜️","text2",()=>{
            type("Currently building my life in Ranchi 🌆","text3",()=>{
                type("Engineer from NIT Kurukshetra 🎓","text4",()=>{
                    type("Currently working at Government of India 💼","text5",()=>{
                        type("Let's connect on Instagram...","text6");
                    });
                });
            });
        });
    });
}

</script>

</body>
</html>
