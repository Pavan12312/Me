<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavan | Intro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
}

/* PARTICLES */
#particles{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
}

/* SLIDES */
.slide{
    position:absolute;
    width:100%;
    height:100vh;
    top:0;
    left:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background-size:cover;
    background-position:center;
    transition:1s;
    animation:zoomIn 8s ease;
}

@keyframes zoomIn{
    from{transform:scale(1.1);}
    to{transform:scale(1);}
}

.hidden{
    transform:translateY(100%);
}

/* OVERLAY */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

/* TEXT */
h1{
    color:white;
    font-size:2.2rem;
    text-align:center;
    padding:20px;
    z-index:2;
    position:relative;
    animation:fadeUp 1.5s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

/* BUTTON */
button{
    z-index:2;
    position:relative;
    padding:14px 30px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:20px;
    display:flex;
    align-items:center;
    gap:10px;
    transition:0.3s;
    box-shadow:0 0 20px rgba(255,75,43,0.6);
}

button:hover{
    transform:scale(1.07);
    box-shadow:0 0 30px rgba(255,75,43,1);
}
</style>
</head>

<body>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<!-- SLIDES -->

<div class="slide" id="slide1" style="background-image:url('YOUR_IMAGE.jpg')">
<div class="overlay"></div>
<h1 id="text1"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide hidden" id="slide2" style="background-image:url('YOUR_IMAGE.jpg')">
<div class="overlay"></div>
<h1 id="text2"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide hidden" id="slide3" style="background-image:url('YOUR_IMAGE.jpg')">
<div class="overlay"></div>
<h1 id="text3"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide hidden" id="slide4" style="background-image:url('YOUR_IMAGE.jpg')">
<div class="overlay"></div>
<h1 id="text4"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide hidden" id="slide5" style="background-image:url('YOUR_IMAGE.jpg')">
<div class="overlay"></div>
<h1 id="text5"></h1>
<button onclick="next()">Next ➝</button>
</div>

<!-- FINAL -->
<div class="slide hidden" id="slide6" style="background:black">
<h1 id="finalText"></h1>

<button onclick="openInsta()">
<i class="fa-brands fa-instagram"></i>
Connect on Instagram
</button>
</div>

<script>

let current = 1;

function next(){
    document.getElementById("slide"+current).classList.add("hidden");
    current++;
    document.getElementById("slide"+current).classList.remove("hidden");
}

/* INSTAGRAM */
function openInsta(){
    navigator.vibrate(100);
    window.open("https://www.instagram.com/pavanm_57?igsh=YW84cDY2MWtsZXY3", "_blank");
}

/* AUTO REDIRECT */
function autoRedirect(){
    setTimeout(()=>{
        window.open("https://www.instagram.com/pavanm_57?igsh=YW84cDY2MWtsZXY3", "_blank");
    },5000);
}

/* TYPING */
function type(text, id, speed=50){
    let i=0;
    function typing(){
        if(i < text.length){
            document.getElementById(id).innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

/* STORY */
type("Hi, I'm Pavan 👋", "text1");

setTimeout(()=>{
    type("Born in Rajasthan 🏜️", "text2");
},2000);

setTimeout(()=>{
    type("Currently building my life in Ranchi 🌆", "text3");
},4000);

setTimeout(()=>{
    type("Engineer from NIT Kurukshetra 🎓", "text4");
},6000);

setTimeout(()=>{
    type("Currently working at Government of India 💼", "text5");
},8000);

setTimeout(()=>{
    type("For more information, let's connect on Instagram...", "finalText",70);
    autoRedirect();
},10000);

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

class Particle{
    constructor(){
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.speedY = Math.random() * 1 + 0.5;
        this.opacity = Math.random();
    }

    update(){
        this.y -= this.speedY;
        if(this.y < 0){
            this.y = canvas.height;
            this.x = Math.random() * canvas.width;
        }
    }

    draw(){
        ctx.fillStyle = "rgba(255,255,255," + this.opacity + ")";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function init(){
    for(let i=0;i<100;i++){
        particlesArray.push(new Particle());
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particlesArray.forEach(p=>{
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize", ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

</script>

</body>
</html>
