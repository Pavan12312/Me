<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavan</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('bg.jpg') no-repeat center/cover;
color:white;
font-family:'Segoe UI',sans-serif;
overflow:hidden;
animation:fadeIn 1.5s ease;
}

/* ENTRY */
@keyframes fadeIn{
from{opacity:0; transform:scale(1.02);}
to{opacity:1; transform:scale(1);}
}

/* OVERLAY */
body::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
top:0;
left:0;
}

/* GLOW */
body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,#ff416c,transparent);
filter:blur(120px);
animation:move 8s infinite alternate;
z-index:1;
}

@keyframes move{
0%{transform:translate(-100px,-100px);}
100%{transform:translate(100px,100px);}
}

.container{
position:relative;
z-index:2;
text-align:center;
max-width:600px;
padding:20px;
}

/* IMAGE */
img{
width:150px;
height:150px;
border-radius:50%;
box-shadow:0 0 40px #ff416c;
margin-bottom:20px;
object-fit:cover;
transition:0.4s;
}

img:hover{
transform:scale(1.05);
box-shadow:0 0 60px #ff416c;
}

/* TITLE */
h1{
margin-bottom:10px;
font-weight:600;
}

/* TYPING */
#typing{
font-size:18px;
opacity:0.85;
line-height:1.6;
min-height:80px;
}

/* CURSOR */
.cursor{
display:inline-block;
width:2px;
height:18px;
background:white;
margin-left:5px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1;}
25%,75%{opacity:0;}
}

/* BUTTON */
button{
margin-top:30px;
padding:12px 30px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
animation:pulse 2s infinite;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 25px #ff416c;
}

@keyframes pulse{
0%{box-shadow:0 0 10px rgba(255,65,108,0.4);}
50%{box-shadow:0 0 25px rgba(255,65,108,0.8);}
100%{box-shadow:0 0 10px rgba(255,65,108,0.4);}
}
</style>
</head>

<body>

<div class="container">

<img src="YOUR_IMAGE.jpg">

<h1>Hi, I'm Pavan 👀</h1>

<div id="typing"><span class="cursor"></span></div>

<a href="https://instagram.com/pavanm_57" target="_blank">
<button>Let's Connect →</button>
</a>

</div>

<script>
let lines = [
  "Hey, this is Pavan",
  "From Rajasthan 🏜️",
  "Engineer from NIT Kurukshetra 🎓",
  "Government Auditor 🏛️",
  "Currently in Ranchi 📍",
  "Focused on growth & discipline 🚀",
  "Not perfect… but worth knowing 🙂"
];

let lineIndex = 0;
let charIndex = 0;

function typeEffect(){
let typingEl = document.getElementById("typing");

if(lineIndex < lines.length){

if(charIndex < lines[lineIndex].length){
typingEl.innerHTML =
lines[lineIndex].substring(0,charIndex+1) +
'<span class="cursor"></span>';

charIndex++;
setTimeout(typeEffect,60);
}else{
lineIndex++;
charIndex = 0;
setTimeout(typeEffect,700);
}
}
}

typeEffect();
</script>

</body>
</html>
