<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavan | Intro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
}

/* CONTAINER */
.container{
    position:relative;
    width:100%;
    height:100vh;
    perspective:1000px; /* 3D effect */
}

/* SLIDES */
.slide{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    transition:opacity 1.2s ease;
}

.active{
    opacity:1;
    z-index:2;
}

/* BG (PARALLAX) */
.bg{
    position:absolute;
    width:110%;
    height:110%;
    background-size:cover;
    background-position:center;
    filter:blur(8px);
    transform:scale(1.1);
    transition:transform 0.3s ease;
}

/* OVERLAY */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

/* TEXT */
h1{
    color:white;
    font-size:2rem;
    text-align:center;
    z-index:2;
    transition:transform 0.3s ease;
}

/* CURSOR */
.cursor{
    display:inline-block;
    width:2px;
    background:white;
    margin-left:5px;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%,50%,100%{opacity:1;}
    25%,75%{opacity:0;}
}

/* BUTTON */
button{
    z-index:2;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff416c;
    color:white;
    margin-top:20px;
}
</style>
</head>

<body>

<audio id="typeSound" src="https://www.soundjay.com/mechanical/typewriter-key-1.mp3"></audio>

<div class="container" id="container">

<!-- SLIDES -->
<div class="slide active">
<div class="bg" style="background-image:url('YOUR_IMAGE.jpg')"></div>
<div class="overlay"></div>
<h1 id="text0"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide">
<div class="bg" style="background-image:url('YOUR_IMAGE.jpg')"></div>
<div class="overlay"></div>
<h1 id="text1"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide">
<div class="bg" style="background-image:url('YOUR_IMAGE.jpg')"></div>
<div class="overlay"></div>
<h1 id="text2"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide">
<div class="bg" style="background-image:url('YOUR_IMAGE.jpg')"></div>
<div class="overlay"></div>
<h1 id="text3"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide">
<div class="bg" style="background-image:url('YOUR_IMAGE.jpg')"></div>
<div class="overlay"></div>
<h1 id="text4"></h1>
<button onclick="next()">Next ➝</button>
</div>

<div class="slide">
<div class="bg" style="background:black"></div>
<div class="overlay"></div>
<h1 id="text5"></h1>
<button onclick="openInsta()">Connect on Instagram</button>
</div>

</div>

<script>

let slides=document.querySelectorAll(".slide");
let current=0;
let touchStartY=0;

/* NEXT */
function next(){
    if(current < slides.length-1){
        slides[current].classList.remove("active");
        current++;
        slides[current].classList.add("active");
        startTyping(current);
    }
}

/* SWIPE */
document.addEventListener("touchstart",e=>{
    touchStartY=e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{
    let end=e.changedTouches[0].clientY;
    if(touchStartY - end > 50){
        next();
    }
});

/* INSTAGRAM */
function openInsta(){
    window.open("https://www.instagram.com/pavanm_57","_blank");
}

/* TYPING */
function type(text,el){
    el.innerHTML="";
    let i=0;
    const sound=document.getElementById("typeSound");

    function typing(){
        if(i<text.length){
            el.innerHTML=text.substring(0,i+1)+'<span class="cursor"></span>';
            sound.currentTime=0;
            sound.play().catch(()=>{});
            i++;
            setTimeout(typing,70);
        } else {
            el.innerHTML=text;
        }
    }
    typing();
}

/* TEXT */
const texts=[
    "Hi, I'm Pavan 👋",
    "Born in Rajasthan 🏜️",
    "Currently living in Ranchi 🌆",
    "Engineer from NIT Kurukshetra 🎓",
    "Working at Government of India 💼",
    "Let's connect on Instagram..."
];

function startTyping(index){
    let el=document.getElementById("text"+index);
    if(el) type(texts[index],el);
}

startTyping(0);

/* 3D TILT + PARALLAX */
document.addEventListener("mousemove",e=>{
    let x=(e.clientX/window.innerWidth - 0.5)*20;
    let y=(e.clientY/window.innerHeight - 0.5)*20;

    document.querySelectorAll(".bg").forEach(bg=>{
        bg.style.transform=`scale(1.1) translate(${x}px, ${y}px)`;
    });

    document.querySelectorAll("h1").forEach(txt=>{
        txt.style.transform=`translate(${x/2}px, ${y/2}px)`;
    });
});

</script>

</body>
</html>
